<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoría Rutas</title>
  <meta name="description" content="Herramienta de auditoría y análisis de rutas y comunas de delivery" />
  <meta name="theme-color" content="#0051BA" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Leaflet CSS — must load BEFORE React app -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

    <!-- Leaflet JS as global window.L — no react-leaflet needed -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <!-- XLSX for export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
      /* Leaflet popup dark theme */
      .leaflet-popup-content-wrapper {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        border-radius: 0 !important;
      }
      .leaflet-popup-content {
        margin: 0 !important;
        padding: 0 !important;
        line-height: normal !important;
      }
      .leaflet-popup-tip-container { display: none !important; }
      .leaflet-popup-close-button {
        color: #bbb !important;
        top: 8px !important;
        right: 12px !important;
        font-size: 18px !important;
        font-weight: 300 !important;
        z-index: 10 !important;
      }
      /* Prevent body scroll */
      body { margin: 0; padding: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- comunas_data.js must be in /public folder and loaded BEFORE React -->
    <script src="/comunas_data.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
